name: 发布新版本

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号(自增)'
        required: false
      runner-type:
        description: '选择运行器类型'
        required: false
        default: 'self-hosted'
        type: choice
        options:
          - self-hosted
          - macos-latest
          - ubuntu-latest
      npm-publish:
        description: '是否发布到 npm'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build:
    name: 构建和上传发布资产
    runs-on: ${{ github.event.inputs.runner-type || 'self-hosted' }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查分支
        if: github.ref != 'refs/heads/main'
        run: |
          echo "错误: 该工作流只能在 main 分支上运行。"
          exit 1

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 缓存根目录依赖
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-root-${{ hashFiles('yarn.lock') }}

      - name: 缓存前端依赖
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/yarn.lock') }}

      - name: 检查 yarn 工具
        run: |
          if ! command -v yarn &> /dev/null; then
             npm install -g yarn
          fi

      - name: 安装根目录依赖
        run: yarn install --ignore-engines

      - name: 安装前端依赖
        working-directory: frontend
        run: yarn install --ignore-engines

      - name: Lint 检查
        run: yarn lint
        continue-on-error: false

      - name: 自动获取/自增版本号
        id: versioning
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="v${{ github.event.inputs.version }}"
          else
            LATEST_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION="v0.0.1"
            else
              VERSION_NUM=${LATEST_TAG#v}
              MAJOR=$(echo $VERSION_NUM | cut -d. -f1)
              MINOR=$(echo $VERSION_NUM | cut -d. -f2)
              PATCH=$(echo $VERSION_NUM | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="v$MAJOR.$MINOR.$PATCH"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "本次发布版本号: $VERSION"

      - name: 生成变更日志
        id: changelog
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            LOG=$(git log --oneline --no-merges -20)
          else
            LOG=$(git log --oneline --no-merges ${LATEST_TAG}..HEAD)
          fi
          # 写入文件避免多行转义问题
          echo "$LOG" > /tmp/changelog.txt
          echo "本次变更:"
          echo "$LOG"

      - name: 构建前端
        working-directory: frontend
        run: yarn build

      - name: 验证前端产物
        run: |
          if [[ ! -f dist/index.html ]]; then
            echo "错误: 前端构建产物 dist/index.html 不存在"
            exit 1
          fi
          echo "前端构建产物验证通过"
          ls -la dist/

      - name: 构建后端
        run: yarn build

      - name: 验证后端产物
        run: |
          if [[ ! -d lib || -z $(ls -A lib) ]]; then
            echo "错误: 后端构建产物 lib/ 不存在或为空"
            exit 1
          fi
          echo "后端构建产物验证通过"
          ls -la lib/

      - name: 打包发布产物
        run: |
          mkdir -p dist-release
          cp -rf ./lib dist-release/lib
          cp -rf ./.puppeteerrc.cjs dist-release/.puppeteerrc.cjs
          cp -rf ./package.json dist-release/package.json
          cp -rf ./README.md dist-release/README.md
          cp -rf ./yarn dist-release/yarn
          cp -rf ./dist dist-release/dist
          mv dist-release ../dist-release

      - name: 推送 release 分支
        run: |
          DEPLOY_BRANCH="release"
          git fetch origin $DEPLOY_BRANCH || echo "远程分支 $DEPLOY_BRANCH 不存在，准备创建..."
          if ! git show-ref --verify --quiet refs/remotes/origin/$DEPLOY_BRANCH; then
             git checkout -b $DEPLOY_BRANCH
             git push origin $DEPLOY_BRANCH
          else
            git checkout $DEPLOY_BRANCH
          fi

          rm -rf node_modules
          rm -rf frontend/node_modules
          rm -rf .gitignore

          find . -mindepth 1 ! -path './.git*' -exec rm -rf {} + || true

          mv ../dist-release/* ./ || {
            echo "错误: 无法将 'dist-release' 目录中的文件移动到根目录"
            exit 1
          }

          if [ ! -d .git ]; then
            echo "错误：.git 目录已丢失"
            exit 1
          fi

          jq 'del(.devDependencies)' package.json > package.json.tmp && mv package.json.tmp package.json
          jq 'del(.workspaces)' package.json > package.json.tmp && mv package.json.tmp package.json
          jq 'del(.private)' package.json > package.json.tmp && mv package.json.tmp package.json
          jq 'del(.scripts)' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg version "${{ steps.versioning.outputs.version }}" '.version = ($version | sub("^v";""))' package.json > package.json.tmp && mv package.json.tmp package.json

          git config --local user.email "ningmengchongshui@gmail.com"
          git config --local user.name "ningmengchongshui"
          git config --local push.autoSetupRemote true
          git add -A
          git commit -m "${{ steps.versioning.outputs.version }}" || echo "没有变更需要提交"
          git push origin $DEPLOY_BRANCH || {
            echo "错误：推送失败"
            exit 1
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 打 tag 并推送
        run: |
          TAG="${{ steps.versioning.outputs.version }}"
          git tag -f $TAG
          git push origin $TAG --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versioning.outputs.version }}
          name: ${{ steps.versioning.outputs.version }}
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布到 npm
        if: github.event.inputs.npm-publish == 'true'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
